name: Build Windows exe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: pyinstaller build/main.spec --noconfirm

      - name: Smoke test (CLI grading on example scans)
        run: |
          # The frozen app resolves config/ and dane/ relative to the exe, so
          # run it from the repo root; -Wait because the windowed exe detaches.
          Copy-Item dist/main.exe .
          Remove-Item dane/WynikiTestu.txt
          Start-Process -FilePath ./main.exe -ArgumentList "--cli" -Wait -NoNewWindow
          if (!(Test-Path "dane/WynikiTestu.txt")) { Write-Error "no results file"; exit 1 }
          if (!(Select-String -Path dane/WynikiTestu.txt -Pattern "123456: 5")) { Write-Error "wrong score"; exit 1 }
          Get-Content dane/WynikiTestu.txt

      - uses: actions/upload-artifact@v4
        with:
          name: main-exe
          path: dist/main.exe
          if-no-files-found: error
